name: Reusable Workflow - ICC Test Automation

on:
  workflow_call:
    inputs:
      GIT_REPO_NAME:
        required: true
        type: string
      BRANCH_NAME:
        required: true
        type: string
      ENVIRONMENT:
        required: true
        type: string
      IMAGE_NAME:
        required: true
        type: string
      project_type:
        required: true
        type: string
      TECHNOLOGY_TYPE:
        required: false
        type: string
        default: ''

    secrets:
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true
      AWS_ACCOUNT_ID:
        required: true
      MAIL_TO:
        required: true

jobs:
  build-test-deploy:
    name: Build, Push to ECR, Deploy to EKS
    runs-on: ubuntu-latest
    environment: ${{ inputs.ENVIRONMENT }}

    env:
      AWS_REGION: ap-south-1
      EKS_CLUSTER_NAME: my-eks-cluster
      IMAGE_TAG: ${{ github.run_id }}
      ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com
      IMAGE_FULL_NAME: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-south-1.amazonaws.com/${{ inputs.IMAGE_NAME }}:${{ github.run_id }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.GIT_REPO_NAME }}
          ref: ${{ inputs.BRANCH_NAME }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_FULL_NAME }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region $AWS_REGION \
            --name $EKS_CLUSTER_NAME

      - name: Verify EKS Cluster
        run: kubectl get nodes

      - name: Helm Deploy to EKS
        run: |
          helm upgrade --install icc-test-automation ./src/helm \
            --namespace "${{ vars.NAMESPACE }}" \
            --create-namespace \
            --set image.repository=${{ env.ECR_REGISTRY }}/${{ inputs.IMAGE_NAME }} \
            --set image.tag=${{ github.run_id }} \
            --set env.mailTo="${{ secrets.MAIL_TO }}"

      - name: Wait for Job Completion
        run: |
          echo "Waiting for job to complete..."

          kubectl wait --for=condition=complete job \
            -l app=icc-test-automation \
            -n "${{ vars.NAMESPACE }}" \
            --timeout=30m || (
              echo "Job failed or timed out"
              kubectl get jobs -n "${{ vars.NAMESPACE }}"
              kubectl get pods -n "${{ vars.NAMESPACE }}"
              exit 1
            )

      - name: Get Pods
        run: kubectl get pods -n "${{ vars.NAMESPACE }}"

      - name: Fetch Job Logs
        run: |
          POD_NAME=$(kubectl get pods -n "${{ vars.NAMESPACE }}" \
            -l app=icc-test-automation \
            -o jsonpath="{.items[0].metadata.name}")

          echo "Pod: $POD_NAME"
          kubectl logs "$POD_NAME" -n "${{ vars.NAMESPACE }}" || true