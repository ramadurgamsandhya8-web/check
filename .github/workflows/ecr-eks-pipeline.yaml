name: AWS ECR EKS Pipeline

on:
  workflow_dispatch:
    inputs:
      IMAGE_NAME:
        required: true
        type: string
        default: icc-test-automation

  push:
    branches:
      - main

jobs:
  build-push-deploy:
    name: Build Push ECR Deploy EKS
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1
      EKS_CLUSTER_NAME: my-eks-cluster
      NAMESPACE: default
      IMAGE_TAG: ${{ github.run_id }}
      IMAGE_NAME: ${{ github.event.inputs.IMAGE_NAME || 'icc-test-automation' }}
      ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
      IMAGE_FULL_NAME: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/${{ github.event.inputs.IMAGE_NAME || 'icc-test-automation' }}:${{ github.run_id }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Verify AWS Identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Create ECR Repository if not exists
        run: |
          aws ecr describe-repositories \
            --repository-names "$IMAGE_NAME" \
            --region "$AWS_REGION" || \
          aws ecr create-repository \
            --repository-name "$IMAGE_NAME" \
            --region "$AWS_REGION"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image to ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_FULL_NAME }}

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.14.0

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --region "$AWS_REGION" \
            --name "$EKS_CLUSTER_NAME"

      - name: Verify EKS Cluster
        run: kubectl get nodes

      - name: Helm Deploy to EKS
        run: |
          helm upgrade --install icc-test-automation ./src/helm \
            --namespace "$NAMESPACE" \
            --create-namespace \
            --set image.repository="$ECR_REGISTRY/$IMAGE_NAME" \
            --set image.tag="$IMAGE_TAG"

      - name: Get Pods
        run: kubectl get pods -n "$NAMESPACE"

      - name: Fetch Pod Logs
        run: |
          POD_NAME=$(kubectl get pods -n "$NAMESPACE" \
            -l app=icc-test-automation \
            -o jsonpath="{.items[0].metadata.name}")

          echo "Pod: $POD_NAME"
          kubectl logs "$POD_NAME" -n "$NAMESPACE" || true
# new trigger
